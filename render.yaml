services:
  - type: web
    name: hub-platform-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/db/migrate.js; node dist/db/seed.js; node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "https://web-a-74c5ba6d.vercel.app"
