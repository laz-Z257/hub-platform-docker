services:
  postgres:
    image: postgres:16-alpine
    container_name: hub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hub_platform}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub_admin -d hub_platform"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: ./backend
    container_name: hub-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:8081}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: hub-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3001/api
    depends_on:
      - api
    restart: unless-stopped

  ota-server:
    build: ./ota-server
    container_name: hub-ota-server
    ports:
      - "3002:3002"
    volumes:
      - ota-data:/usr/share/nginx/html
    restart: unless-stopped

  ota-builder:
    build:
      context: ./mobile
      dockerfile: Dockerfile.ota
    container_name: hub-ota-builder
    profiles:
      - build-only
    volumes:
      - ota-data:/output

  mobile-builder:
    build:
      context: .
      dockerfile: mobile/Dockerfile.builder
    container_name: hub-mobile-builder
    profiles:
      - build-only
    volumes:
      - ./mobile/output:/output

volumes:
  pgdata:
  ota-data:
